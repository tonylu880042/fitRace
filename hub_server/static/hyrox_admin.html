<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitRaceStudio - Hyrox 主控台</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;800&family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@500;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #18181b;
      --border: #27272a;
      --text: #f8fafc;
      --accent: #e2ff3b;
      --amber: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Outfit", "Noto Sans TC", sans-serif;
      padding: 24px;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .shell {
      width: min(800px, 100%);
      display: grid;
      gap: 20px;
    }

    header {
      border: 2px solid var(--border);
      background: var(--surface);
      padding: 24px;
      border-radius: 4px;
      position: relative;
    }

    header::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      background: var(--accent);
    }

    h1 {
      font-family: "Oswald", sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      margin: 0 0 6px 0;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .subtitle {
      margin: 0;
      color: #a1a1aa;
    }

    .control-panel {
      border: 2px solid var(--border);
      background: var(--surface);
      padding: 24px;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-family: "Oswald", sans-serif;
      text-transform: uppercase;
      font-weight: 700;
      font-size: 14px;
      color: #a1a1aa;
    }

    select, input {
      background: #09090b;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 16px;
    }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px;
      font-family: "Oswald", sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s;
    }

    button:hover {
      background: #c5e02c;
    }

    .success-msg {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="shell">
    <header>
      <h1>Hyrox Control Center</h1>
      <p class="subtitle">賽事與訓練配置控制台</p>
    </header>

    <div class="control-panel">
      <!-- Session Settings -->
      <div class="form-group">
        <label for="session-type">紀錄類型 (Record Type)</label>
        <select id="session-type">
          <option value="training">訓練模式 (Training Log)</option>
          <option value="competition">競賽模式 (Official Competition)</option>
        </select>
      </div>

      <!-- Division Selection -->
      <div class="form-group">
        <label for="competition-mode">組別編制 (Division Format)</label>
        <select id="competition-mode">
          <option value="individual">個人組 (Individual)</option>
          <option value="doubles">雙人組 (Doubles)</option>
          <option value="relay">四人接力組 (Relay)</option>
        </select>
      </div>

      <button id="btn-save-config">套用設定 // APPLY CONFIG</button>
      <button id="btn-start-race" style="background: var(--amber);">啟動計時 // START RACE</button>
      <p id="feedback" class="success-msg"></p>
    </div>
  </div>

  <script>
    // Same token storage as gameAdmin/systemAdmin
    function adminHeaders() {
      const headers = { 'Content-Type': 'application/json' };
      const token = localStorage.getItem('fitrace.adminPassword') || localStorage.getItem('fitrace.adminToken') || '';
      if (token) headers['X-FitRace-Admin-Token'] = token;
      return headers;
    }

    async function adminPost(url, body) {
      let res = await fetch(url, { method: 'POST', headers: adminHeaders(), body: body ? JSON.stringify(body) : undefined });
      if (res.status === 401) {
        const token = prompt('請輸入管理員密碼 (Admin Token)');
        if (token) {
          localStorage.setItem('fitrace.adminToken', token);
          localStorage.setItem('fitrace.adminPassword', token);
          res = await fetch(url, { method: 'POST', headers: adminHeaders(), body: body ? JSON.stringify(body) : undefined });
        }
      }
      return res;
    }

    function showFeedback(text) {
      document.getElementById('feedback').textContent = text;
      setTimeout(() => document.getElementById('feedback').textContent = '', 3000);
    }

    document.getElementById('btn-save-config').onclick = async () => {
      const mode = document.getElementById('competition-mode').value;
      const type = document.getElementById('session-type').value;

      try {
        const res = await adminPost('/api/hyrox/configure', { competition_mode: mode, session_type: type });
        if (res.ok) {
          showFeedback('設定套用成功！');
        } else {
          alert('設定套用失敗: HTTP ' + res.status);
        }
      } catch (err) {
        alert("設定套用失敗: " + err);
      }
    };

    document.getElementById('btn-start-race').onclick = async () => {
      try {
        const res = await adminPost('/api/hyrox/start');
        if (res.ok) {
          showFeedback('競賽已成功啟動！');
        } else {
          alert('啟動失敗: HTTP ' + res.status);
        }
      } catch (err) {
        alert("啟動失敗: " + err);
      }
    };
  </script>
</body>
</html>
