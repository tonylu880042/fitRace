<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitRaceStudio - 系統網路配置</title>
  <meta name="description" content="樹莓派 WiFi 配置與熱點設定門戶">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@500;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #09090b;
      --card-bg: #18181b;
      --steel-border: #27272a;
      --volt-yellow: #e2ff3b;
      --crimson-red: #f43f5e;
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
      --badge-station: #3b82f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      position: relative;
      overflow-y: auto;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 0);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: -1;
    }

    .setup-container {
      width: 100%;
      max-width: 460px;
      background: var(--card-bg);
      border: 2px solid var(--steel-border);
      border-radius: 8px;
      padding: 2.5rem 2rem;
      position: relative;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    .setup-container::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: repeating-linear-gradient(
        -45deg,
        var(--volt-yellow),
        var(--volt-yellow) 8px,
        #000 8px,
        #000 16px
      );
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
    }

    .logo {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .logo span {
      color: var(--volt-yellow);
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .status-panel {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--steel-border);
      border-radius: 6px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .status-header {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.75rem;
      font-weight: bold;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      color: var(--text-muted);
    }

    .status-value {
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-ap {
      background: rgba(226, 255, 59, 0.1);
      border: 1px solid var(--volt-yellow);
      color: var(--volt-yellow);
    }

    .badge-station {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid var(--badge-station);
      color: var(--badge-station);
    }

    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-control {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--steel-border);
      border-radius: 4px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 1.05rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--volt-yellow);
      box-shadow: 0 0 8px rgba(226, 255, 59, 0.15);
    }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 0.9rem 1.5rem;
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-bottom: 1rem;
    }

    .btn-primary {
      background: var(--volt-yellow);
      color: #000;
    }

    .btn-primary:hover {
      background: #eaff54;
      box-shadow: 0 0 12px rgba(226, 255, 59, 0.35);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--crimson-red);
      color: var(--crimson-red);
    }

    .btn-secondary:hover {
      background: rgba(244, 63, 94, 0.1);
      box-shadow: 0 0 12px rgba(244, 63, 94, 0.25);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 4px;
      font-size: 0.9rem;
      display: none;
      text-align: center;
    }

    .msg-success {
      background: rgba(226, 255, 59, 0.1);
      border: 1px solid var(--volt-yellow);
      color: var(--volt-yellow);
    }

    .msg-error {
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid var(--crimson-red);
      color: var(--crimson-red);
    }

    .msg-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid var(--badge-station);
      color: var(--badge-station);
    }

    .spinner {
      border: 3px solid rgba(0, 0, 0, 0.1);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border-left-color: #000;
      animation: spin 1s linear infinite;
      display: none;
      margin-left: 10px;
    }

    .spinner-secondary {
      border-left-color: var(--crimson-red);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="setup-container">
    <div class="logo">FitRace<span>Studio</span></div>
    <div class="subtitle">WiFi & Network Configuration</div>

    <div class="status-panel">
      <div class="status-header">Current Connection Status</div>
      <div class="status-row">
        <span class="status-label">Network Mode:</span>
        <span class="status-value" id="status-mode">-</span>
      </div>
      <div class="status-row">
        <span class="status-label">Active SSID:</span>
        <span class="status-value" id="status-ssid">-</span>
      </div>
      <div class="status-row">
        <span class="status-label">Hub IP Address:</span>
        <span class="status-value" id="status-ip">-</span>
      </div>
    </div>

    <form id="wifi-form" onsubmit="submitWiFi(event)">
      <div class="form-group">
        <label for="wifi-ssid">Venue WiFi SSID / 場館 WiFi 名稱</label>
        <input type="text" id="wifi-ssid" class="form-control" placeholder="Enter SSID..." required>
      </div>

      <div class="form-group">
        <label for="wifi-password">WiFi Password / 密碼</label>
        <input type="password" id="wifi-password" class="form-control" placeholder="Enter Password..." required>
      </div>

      <button type="submit" class="btn btn-primary" id="save-btn">
        <span>Connect & Apply / 儲存並連線</span>
        <div class="spinner" id="save-spinner"></div>
      </button>
    </form>

    <button class="btn btn-secondary" id="reset-btn" onclick="resetWiFi()">
      <span>Reset to AP Mode / 重置熱點模式</span>
      <div class="spinner spinner-secondary" id="reset-spinner"></div>
    </button>

    <div class="msg msg-success" id="success-msg">Connected successfully! Hub switched to Station mode.</div>
    <div class="msg msg-error" id="error-msg">Failed to connect to the WiFi. Please check settings.</div>
    <div class="msg msg-info" id="info-msg">Applying settings. Please wait while network restarts...</div>
  </div>

  <script>
    const modeEl = document.getElementById('status-mode');
    const ssidEl = document.getElementById('status-ssid');
    const ipEl = document.getElementById('status-ip');

    const saveBtn = document.getElementById('save-btn');
    const saveSpinner = document.getElementById('save-spinner');
    const resetBtn = document.getElementById('reset-btn');
    const resetSpinner = document.getElementById('reset-spinner');

    const successMsg = document.getElementById('success-msg');
    const errorMsg = document.getElementById('error-msg');
    const infoMsg = document.getElementById('info-msg');

    async function fetchStatus() {
      try {
        const res = await fetch('/api/setup/status');
        if (res.ok) {
          const data = await res.json();
          updateUI(data);
        }
      } catch (err) {
        console.error("Failed to fetch status:", err);
      }
    }

    function updateUI(data) {
      modeEl.innerText = data.mode;
      if (data.mode === 'AP') {
        modeEl.className = 'badge badge-ap';
      } else {
        modeEl.className = 'badge badge-station';
      }
      ssidEl.innerText = data.ssid || 'None';
      ipEl.innerText = data.ip_address || 'None';
    }

    async function submitWiFi(event) {
      event.preventDefault();
      const ssid = document.getElementById('wifi-ssid').value.trim();
      const password = document.getElementById('wifi-password').value;

      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';
      infoMsg.style.display = 'block';

      saveBtn.disabled = true;
      resetBtn.disabled = true;
      saveSpinner.style.display = 'inline-block';

      try {
        const res = await fetch('/api/setup/wifi', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ssid, password })
        });

        if (res.ok) {
          const data = await res.json();
          updateUI(data);
          successMsg.style.display = 'block';
          infoMsg.style.display = 'none';
        } else {
          errorMsg.style.display = 'block';
          infoMsg.style.display = 'none';
        }
      } catch (err) {
        errorMsg.innerText = "Network timeout. Hub might be switching networks. Please connect to the venue WiFi and reload.";
        errorMsg.style.display = 'block';
        infoMsg.style.display = 'none';
      } finally {
        saveBtn.disabled = false;
        resetBtn.disabled = false;
        saveSpinner.style.display = 'none';
      }
    }

    async function resetWiFi() {
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';
      infoMsg.style.display = 'block';
      infoMsg.innerText = "Reverting to AP mode...";

      saveBtn.disabled = true;
      resetBtn.disabled = true;
      resetSpinner.style.display = 'inline-block';

      try {
        const res = await fetch('/api/setup/reset', { method: 'POST' });
        if (res.ok) {
          const data = await res.json();
          updateUI(data);
          successMsg.innerText = "Switched to AP mode. Connect to 'FitRaceStudio_Setup' WiFi.";
          successMsg.style.display = 'block';
          infoMsg.style.display = 'none';
        } else {
          errorMsg.style.display = 'block';
          infoMsg.style.display = 'none';
        }
      } catch (err) {
        errorMsg.innerText = "Failed to communicate with the Hub.";
        errorMsg.style.display = 'block';
        infoMsg.style.display = 'none';
      } finally {
        saveBtn.disabled = false;
        resetBtn.disabled = false;
        resetSpinner.style.display = 'none';
      }
    }

    // Load initial status
    fetchStatus();
    // Poll status every 5 seconds
    setInterval(fetchStatus, 5000);
  </script>
</body>
</html>
